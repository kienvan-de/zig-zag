<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Copilot — Authorize zig-zag</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:          #0e0e10;
      --surface:     #1a1a1f;
      --surface-alt: #222228;
      --border:      #2e2e35;
      --border-hover:#44444d;
      --accent:      #6c8aff;
      --accent-hover:#8aa2ff;
      --text:        #e4e4e7;
      --text-muted:  #8e8e96;
      --success:     #34d399;
      --radius:      6px;
      --radius-lg:   10px;
      --font:        -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --mono:        "SF Mono",SFMono-Regular,ui-monospace,Menlo,Consolas,monospace;
      --transition:  .15s ease;
    }
    body{
      font-family:var(--font);
      font-size:14px;
      line-height:1.5;
      color:var(--text);
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:40px;
      max-width:480px;
      width:100%;
      text-align:center;
    }
    .logo{margin-bottom:16px}
    .logo img{width:64px;height:64px;border-radius:14px}
    h1{font-size:22px;font-weight:600;margin-bottom:8px;color:var(--text)}
    h1 span{color:var(--accent)}
    p{color:var(--text-muted);margin-bottom:24px;font-size:14px}
    .code-box{
      background:var(--bg);
      border:2px solid var(--accent);
      border-radius:var(--radius);
      padding:20px;
      margin-bottom:24px;
      position:relative;
    }
    .code{
      font-family:var(--mono);
      font-size:36px;
      font-weight:700;
      letter-spacing:6px;
      color:var(--accent);
      user-select:all;
    }
    .copy-btn{
      position:absolute;
      top:8px;
      right:8px;
      background:var(--surface-alt);
      border:1px solid var(--border);
      color:var(--text-muted);
      border-radius:var(--radius);
      padding:4px 10px;
      font-size:12px;
      font-family:var(--font);
      cursor:pointer;
      transition:background var(--transition),color var(--transition),border-color var(--transition);
    }
    .copy-btn:hover{background:var(--surface);border-color:var(--border-hover);color:var(--text)}
    .open-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      background:var(--accent);
      color:#fff;
      border-radius:var(--radius);
      padding:12px 28px;
      font-size:15px;
      font-weight:600;
      font-family:var(--font);
      text-decoration:none;
      border:1px solid var(--accent);
      cursor:pointer;
      transition:background var(--transition),border-color var(--transition);
    }
    .open-btn:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
    .hint{margin-top:20px;font-size:12px;color:var(--text-muted)}
    .copied{color:var(--success) !important}
  </style>
</head>

    <h1>Authorize <span>zig-zag</span></h1>
    <p>Copy the one-time code below, then click the button<br>to authorize on GitHub.</p>
    <div class="code-box">
      <div class="code" id="code">{{USER_CODE}}</div>
      <button class="copy-btn" onclick="copyCode()" id="copy-btn">Copy</button>
    </div>
    <a class="open-btn" href="{{VERIFICATION_URI}}" target="_blank" onclick="copyCode()">
      Open GitHub &amp; Authorize
    </a>
    <p class="hint">The button will also copy the code automatically.</p>
  </div>
  <script>
    function copyCode() {
      const code = document.getElementById('code').innerText;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }
    // Auto-copy on page load
    window.addEventListener('load', () => {
      navigator.clipboard.writeText('{{USER_CODE}}').catch(() => {});
    });
  </script>
</body>
