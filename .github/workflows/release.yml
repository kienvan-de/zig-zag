name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ZIG_VERSION: "0.15.2"

jobs:
  # Build CLI binaries for multiple platforms
  # Note: Windows is not supported due to POSIX-specific code (sockets, file descriptors, etc.)
  build-cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: zig-zag-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-linux
            artifact: zig-zag-linux-aarch64
          - os: macos-26
            target: aarch64-macos
            artifact: zig-zag-macos-aarch64
          - os: macos-26
            target: x86_64-macos
            artifact: zig-zag-macos-x86_64

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build release binary
        run: zig build exec:rls -Dtarget=${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp zig-out/bin/zig-zag dist/
          cd dist && tar -czvf ../${{ matrix.artifact }}.tar.gz zig-zag

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-macos-app:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build Zig library (release)
        run: zig build lib:rls

      - name: Build macOS app (release)
        run: |
          xcodebuild -project ui/macos/zig-zag/zig-zag.xcodeproj \
            -scheme zig-zag \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Compress app bundle
        run: |
          APP_PATH="build/Build/Products/Release/zig-zag.app"
          tar -czvf zig-zag-macos-app.tar.gz -C "$(dirname "$APP_PATH")" "$(basename "$APP_PATH")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zig-zag-macos-app
          path: zig-zag-macos-app.tar.gz

  # Create GitHub Release
  release:
    needs: [build-cli, build-macos-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Pack pricing archive
        run: |
          cd pricing
          sha256sum *.csv > checksum.sha256
          cat checksum.sha256
          tar -czf ../pricing.tar.gz *.csv checksum.sha256

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name "*.tar.gz" -exec cp {} release/ \;
          cp pricing.tar.gz release/
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*
          body: |
            ## Downloads
            
            | Platform | Architecture | File |
            |----------|--------------|------|
            | macOS App | Apple Silicon | `zig-zag-macos-app.tar.gz` |
            | macOS CLI | Apple Silicon | `zig-zag-macos-aarch64.tar.gz` |
            | macOS CLI | Intel | `zig-zag-macos-x86_64.tar.gz` |
            | Linux | x86_64 | `zig-zag-linux-x86_64.tar.gz` |
            | Linux | ARM64 | `zig-zag-linux-aarch64.tar.gz` |
            | Pricing | All | `pricing.tar.gz` |
            
            > **Note:** Windows is not currently supported due to POSIX-specific code.
            > **Note:** macOS app is unsigned — you may need to right-click → Open on first launch.
            > **Note:** Pricing data auto-updates on startup (macOS/Linux). Manual: extract `pricing.tar.gz` to `~/.config/zig-zag/pricing/`.
            
            ## Checksums
            
            See `checksums.txt` for SHA256 checksums of all files.
          draft: false
          prerelease: false
