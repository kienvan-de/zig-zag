name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ZIG_VERSION: "0.15.2"

jobs:
  # Build CLI binaries for multiple platforms
  # Note: Windows is not supported due to POSIX-specific code (sockets, file descriptors, etc.)
  build-cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: zig-zag-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-linux
            artifact: zig-zag-linux-aarch64
          - os: macos-26
            target: aarch64-macos
            artifact: zig-zag-macos-aarch64
          - os: macos-26
            target: x86_64-macos
            artifact: zig-zag-macos-x86_64

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build release binary
        run: zig build exec:rls -Dtarget=${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp zig-out/bin/zig-zag dist/
          cd dist && tar -czvf ../${{ matrix.artifact }}.tar.gz zig-zag

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-macos-app:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build Zig library (release)
        run: zig build lib:rls

      - name: Build macOS app (release)
        run: |
          xcodebuild -project ui/macos/zig-zag/zig-zag.xcodeproj \
            -scheme zig-zag \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Compress app bundle
        run: |
          APP_PATH="build/Build/Products/Release/zig-zag.app"
          tar -czvf zig-zag-macos-app.tar.gz -C "$(dirname "$APP_PATH")" "$(basename "$APP_PATH")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zig-zag-macos-app
          path: zig-zag-macos-app.tar.gz

  # Create GitHub Release
  release:
    needs: [build-cli, build-macos-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Pack pricing archive
        run: |
          cd pricing
          sha256sum *.csv > checksum.sha256
          cat checksum.sha256
          tar -czf ../pricing.tar.gz *.csv checksum.sha256

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name "*.tar.gz" -exec cp {} release/ \;
          cp pricing.tar.gz release/
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate release notes
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          echo "Current: $CURRENT_TAG, Previous: ${PREVIOUS_TAG:-none}"
          if [ -n "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..${CURRENT_TAG}^" | grep -v "^- chore: bump version" || true)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" | grep -v "^- chore: bump version" || true)
          fi
          {
            echo "## What's Changed"
            echo ""
            echo "${COMMITS:-_No changes_}"
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|--------------|------|"
            echo "| macOS App | Apple Silicon | \`zig-zag-macos-app.tar.gz\` |"
            echo "| macOS CLI | Apple Silicon | \`zig-zag-macos-aarch64.tar.gz\` |"
            echo "| macOS CLI | Intel | \`zig-zag-macos-x86_64.tar.gz\` |"
            echo "| Linux | x86_64 | \`zig-zag-linux-x86_64.tar.gz\` |"
            echo "| Linux | ARM64 | \`zig-zag-linux-aarch64.tar.gz\` |"
            echo "| Pricing | All | \`pricing.tar.gz\` |"
            echo ""
            echo "> **Note:** Windows is not currently supported due to POSIX-specific code."
            echo "> **Note:** macOS app is unsigned — you may need to right-click → Open on first launch."
            echo "> **Note:** Pricing data auto-updates on startup (macOS/Linux). Manual: extract \`pricing.tar.gz\` to \`~/.config/zig-zag/pricing/\`."
            echo ""
            echo "## Checksums"
            echo ""
            echo "See \`checksums.txt\` for SHA256 checksums of all files."
          } > RELEASE_NOTES.md
          echo "--- Release notes ---"
          cat RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false

  # Update Homebrew tap with new version and checksums
  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: kienvan-de/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download checksums
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          curl -sL "https://github.com/kienvan-de/zig-zag/releases/download/v${VERSION}/checksums.txt" \
            -o checksums.txt
          echo "--- Checksums ---"
          cat checksums.txt

      - name: Update Formula/zig-zag.rb
        run: |
          SHA_MACOS_ARM=$(grep "zig-zag-macos-aarch64.tar.gz" checksums.txt | awk '{print $1}')
          SHA_MACOS_X86=$(grep "zig-zag-macos-x86_64.tar.gz"  checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM=$(grep "zig-zag-linux-aarch64.tar.gz"  checksums.txt | awk '{print $1}')
          SHA_LINUX_X86=$(grep "zig-zag-linux-x86_64.tar.gz"   checksums.txt | awk '{print $1}')

          FILE="homebrew-tap/Formula/zig-zag.rb"

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FILE"

          # Update SHA256 hashes (order matches the file: macos-arm, macos-x86, linux-arm, linux-x86)
          python3 - "$FILE" "$SHA_MACOS_ARM" "$SHA_MACOS_X86" "$SHA_LINUX_ARM" "$SHA_LINUX_X86" <<'EOF'
          import sys, re

          path, sha_macos_arm, sha_macos_x86, sha_linux_arm, sha_linux_x86 = sys.argv[1:]
          shas = [sha_macos_arm, sha_macos_x86, sha_linux_arm, sha_linux_x86]

          with open(path) as f:
              content = f.read()

          idx = 0
          def replacer(m):
              global idx
              result = f'sha256 "{shas[idx]}"'
              idx += 1
              return result

          content = re.sub(r'sha256 "[0-9a-f]+"', replacer, content)

          with open(path, "w") as f:
              f.write(content)
          EOF

          echo "--- Updated Formula ---"
          cat "$FILE"

      - name: Update Casks/zig-zag.rb
        run: |
          SHA_APP=$(grep "zig-zag-macos-app.tar.gz" checksums.txt | awk '{print $1}')
          FILE="homebrew-tap/Casks/zig-zag.rb"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FILE"
          sed -i "s/sha256 \".*\"/sha256 \"${SHA_APP}\"/" "$FILE"

          echo "--- Updated Cask ---"
          cat "$FILE"

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zig-zag.rb Casks/zig-zag.rb
          git commit -m "chore: bump zig-zag to v${VERSION}"
          git push
